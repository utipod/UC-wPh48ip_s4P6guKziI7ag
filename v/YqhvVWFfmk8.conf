title = "Dr Soroush Kimiyaye Saadat 19 گزینش و شرح کیمیای سعادت غزّالی دکتر عبدالکریم سروش، جلسه نوزدهم"
description = "در نشست نوزدهم از سلسله‌درس‌گفتارهای دکتر عبدالکریم سروش در گزینش و شرح کیمیای سعادت امام محمد غزالی، ایشان مقدمه‌ای نسبتا طولانی(بیش از ۵۰ دقیقه)‌درباره اهمیت این فصل و همچنین اهمیت فصلی که درباره امر به معروف و نهی از منکر است بیان کردند و این دو فصل را نگره‌ای به اندیشه سیاسی غزالی دانستند.\nسپس به بیان این نکته پرداخت که بر خلاف برخی از محققان که معتقدند آرای سیاسی غزالی در کتاب نصیحه‌الملوک او گردآوری شده است، با اشاره به تحقیق علامه محمد قزوینی و برخی محققان دیگر، به تردید در انتساب کتاب منتشر شده( بر اساس تحصحیح دکتر جلا‌الدین همایی) \nپرداخت و گفت هم اینک تقریبا ثابت شده که کتاب نصیحه‌الملوک یادشده متعلق به غزالی نیست.\nاو همچنین به آرای دوتن از افرادی که به آنها لقب ممتنع‌اندیش داده است، اشاره کرده وگفت که آنها احتمالا کتاب اصلی غزالی(احیاء علوم‌الدین) و حتی ترجمه و تلخیص این کتاب(کیمیای سعادت) و به خصوص دو فصل مهم  یادشده را نخوانده‌اند که یکی از آنها لقب دهاتی و دیگری لقب فریبکار را برای این مرد بزرگ به کار برده‌اند. در حالی که غزالی اگر به دنبال فریبکاری بود به آن همه امکاناتی که در اختیار او قرار گرفته بود پشت پا نمی زد و گوشه عزلت اختیار نمی کرد که چنین آثاری را تالیف و تصنیف کند.\nبه باور دکتر سروش غزالی در آن دوره و به خصوص با طرح موضوعات زیر توانست عملا به روابط بین مردم با یکدیگر و اجتماعیات آن دوران به خوبی بذل توجه کند.\n پس از این مقدمه طولانی دکتر سروش بخش‌هایی از فصل در اداب حلال و حرام را برای حاضران خواند و به پرسش‌های مخاطبان پاسخ گفتند\n\nwww.iccnc.org\n\n https://twitter.com/ICCNC\n\n https://www.instagram.com/iccncofficial\n\nhttps://t.me/Iccnc\n\nhttps://www.facebook.com/ICCNCORG\n\nhttps://www.youtube.com/user/iccnc1\n\nhttps://www.yelp.com/biz/islamic-cultural-center-of-northern-california-oakland-2"

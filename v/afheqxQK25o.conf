title = "Science & Religion 11 Dr Soroush April 3 2021 خلاف و وفاق علم و دین دکتر عبدالکریم سروش جلسه یازدهم"
description = "در بخش یازدهم از درس‌گفتار خلاف و وفاق علم و دین دکتر سروش به مبحثی لازم اما جدای از مبحث اصلی می‌پردازد و آن توضیح و تبیینی از تاریخ ، علم تاریخ و فلسفه تاریخ.\nایشان در این بخش ضمن تعریف تاریخ ، علم  تاریخ و فلسفه تاریخ، علم تاریخ را همانند علم ستاره‌شناسی دانست که تنها به گذشته می‌پردازد و هیچ تغییری نیز در گذشته نمی‌تواند بدهد. تغییری که آن را به یک علم تماشاگر همانند ستاره شناسی شبیه می‌کند و هم این که از آن بازیگری به دور می‌دارد.\n \nwww.iccnc.org\n\n https://twitter.com/ICCNC\n\n https://www.instagram.com/iccncofficial\n\nhttps://t.me/Iccnc\n\nhttps://www.facebook.com/ICCNCORG\n\nhttps://www.youtube.com/user/iccnc1\n\nhttps://www.yelp.com/biz/islamic-cultural-center-of-northern-california-oakland-2"

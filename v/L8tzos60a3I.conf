title = "Science & Religion  4 Dr Soroush Dec 12 2021 خلاف و وفاق علم و دین دکتر عبدالکریم سروش جلسه چهارم"
description = "#عبدالکریم_سروش #دکترسروش #خلاف_و_وفاق_علم_و_دین #مرکز_اسلامی_فرهنگی_شمال_کالیفرنیا\n#ICCNC #DrSoroush \nنشست چهارم خلاف و وفاق علم ودین پس از سه‌ ماه وقفه در ۱۲ دسامبر  برگزار شد.\nدر ابتدای نشست دکتر سروش به یادآوری خلاصه‌ای از نشست‌های گذشته پرداخت و گفت دو منبع برای معرفت در طول تاریخ پیش‌بینی شده بود که یکی عقل بود و دیگری وحی که از گذشته تا به امروز با یکدیگر در توافق یا تخالف بودند،  اما در دوره جدید علم تجربی به عنوان نماد عقل و دین هم به عنوان نماد وحی دو منبع معرفتی معرفی شدند \nاین دو منبع به خصوص پس از دوره رنسانس و حضور دانشمندانی چون گالیله و بعدها داروین با یکدیگر به نزاع‌های سختی پرداختند و علم یا عقل تردید‌های جدی در باورهای معرفت دینی وارد کردند.\nاز قرن ۱۸ به بعد علم و دین به نوعی وارد نزاع و کشمکش‌های تازه‌تری شدند و در نهایت هر از گاه این نزاع فروکش می کند و هراز گاه سربرمی‌آورد.\nبه گفته دکتر سروش لب وعصاره بحث این نشست در تغییر عقلانیت و پارادایم آن است به نحوی که عقلانیت دوره‌های گذشته با توجه به رشد روزافزون علم تجربی و شقوق دیگر علم، عملا کارکردهای خود را از دست داده و عقلانیت تازه‌ای متولد شده است که تفضیل آن را در این نشست خواهید شنید.\nwww.iccnc.org\n\n https://twitter.com/ICCNC\n\n https://www.instagram.com/iccncofficial\n\nhttps://t.me/Iccnc\n\nhttps://www.facebook.com/ICCNCORG\n\nhttps://www.youtube.com/user/iccnc1\n\nhttps://www.yelp.com/biz/islamic-cultural-center-of-northern-california-oakland-2"

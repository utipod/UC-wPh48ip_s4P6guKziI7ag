title = "Religion and Science 1 Dr. Soroush Aug 15 2021 خلاف و وفاق علم و دین-دکتر عبدالکریم سروش- جلسه اول"
description = "#عبدالکریم_سروش #دکترسروش #خلاف_و_وفاق_علم_و_دین #مرکز_اسلامی_فرهنگی_شمال_کالیفرنیا\n#ICCNC #DrSoroush \nدر نخستین نشست از مجموعه درس‌گفتارهای خلاف و وفاق علم ودین که ۱۵ آگوست ۲۰۲۱ و از طریق زوم مرکز اسلامی و فرهنگی شمال کالیفرنیا برگزار شد، دکتر سروش به پیشینه مطالعاتی نزدیک به نیم قرنی خود در زمینه تاریخ و فلسفه علم و تحصیلات آکادمیکش در دانشگاه لندن و همچنین به تلاشش در پیشنهاد راه‌اندازی شاخه فلسفه علم در ایران اشاره کرد.\nبه گفته آقای سروش عمده مطالعاتی که در زمینه رابطه دین وعلم صورت گرفته با تاکید وتکیه بر دین مسیحی است ودرباره اسلام تا کنون کمتر پژوهش و تحقیق صورت گرفته است.\nاو نظریه قبض و بسط تئوریک شریعت را برآمده از مطالعاتش در فلسفه علم و نسبتش با دین دانست که نوعی تاریخ‌اندیشی در دین بود که پابه پای تکامل وتحول موارد دیگر، به تحول و تکامل یا انحطاط معرفت دینی نیز می‌پرداخت و بر این باور است که تاریخیت و نگاه تاریخ، سبب قبض و بسط معرفت دینی می‌شود و پا به پای رشد معرفت علمی، رشد معرفت دینی هم رخ خواهد داد.\nدکتر سروش تاریخ علم را به مثابه آشپزخانه‌ای دانست که در آن مواد خام و اتفاقاتی رخ می‌دهد که کمتر کسی از آن آگاه است و نتیجه ومحصول آن که علم است را به مانند غذای ارائه شده در رستوران به شمار آورد که کسی از چگونگی فرآوری آگاهی ندارد.\nوی همچنین به تاریخ و علم و دین پرداخت  که در آن رقیبان و دشمنان هر کدام بروزی جدی دارند و موانعی را بر سر راه هر کدام می‌نهند.\nاو نگاه تاریخ به دین و علم را در این دوره مهم دانست و گفت در مجموعه دروس خلاف و وفاق علم و دین، با همین نگاه تاریخی و با تکیه بر دین اسلام  و بیان مصادیق تاریخ از آن، مباحث را به پیش خواهد برد.\nتوضیح آنکه در ابتدای سخنرانی و تا دقیقه ۲۴ آقای سروش به نکاتی درباره رخدادهای روز ایران و افغانستان می پردازد و اصل بحث از دقیقه ۲۴ شروع می شود.\nwww.iccnc.org\n\n https://twitter.com/ICCNC\n\n https://www.instagram.com/iccncofficial\n\nhttps://t.me/Iccnc\n\nhttps://www.facebook.com/ICCNCORG\n\nhttps://www.youtube.com/user/iccnc1\n\nhttps://www.yelp.com/biz/islamic-cultural-center-of-northern-california-oakland-2"

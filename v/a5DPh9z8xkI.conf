title = "Religion and Science 2 Dr  Soroush Aug 29 2021 خلاف و وفاق علم و دین دکتر عبدالکریم سروش  جلسه دوم"
description = "#عبدالکریم_سروش #دکترسروش #خلاف_و_وفاق_علم_و_دین #مرکز_اسلامی_فرهنگی_شمال_کالیفرنیا\n#ICCNC #DrSoroush \n\nدر دومین نشست از درس‌گفتار خلاف و وفاق علم و دین دکتر سروش به تبیین دقیق‌تری از مباحث مطروحه در این سلسله درس‌گفتارها می‌پردازد.\nاز یک طرف بین علم و دین مخالفت، تضاد و تخالف صورت می‌گیرد و از دیگر سو وفاق و همراهی و همداستانی رخ می‌دهد اگرچه در روزگار ما خلاف و تضاد بین علم و دین بسی بیشتر از وفاق و همراهی است.\nو باور برخی این است که دین عمدتا در میان تحصیل‌کردگان پایگاهی ندارد.\nدر ادامه دکتر سروش تصویری عمومی از وضعیت دین و نیز وضعیت علمی در تاریخ گذشته را برای حاضران بیان می‌کند که تا قبل از دوره مدرن چه تحولاتی را پشت سر گذاشته است.\nاو همچنین به حضور برخی فیلسوفان ملحد در تاریخ قدیم تفکر ایرانی- اسلامی اشاره کرد.\nدکتر سروش همچنین به برخی مباحث علمی مطرح شده از جمله دیدگاه‌های مرحوم مهدی بازرگان در کتاب راه طی شده نیز اشاره کرد.\nمرحوم بازرگان در این کتاب در پی بیان این نکته بود که پیشرفت‌های علمی به اندازه‌ای شده است که تقریبا راهی را که پیامبران می‌خواستند پیروان طی کنند، با این پیشرفت‌ها طی شده است.\nآقای سروش همچنین به دیدگاه‌های راشد خلیفه و نقاط ضعف  قوتش در کارش و ادعای شاذ او اشاره کرد که دعوی پیامبری هم کرده بود.\n پرسش و پاسخ درباره بخشی از این مباحث نیز قابل اعتنا و توجه و برخی ابهامات ایجاد شده در حین سخنرانی را ایضاح افزونتری بخشیده است.\nwww.iccnc.org\n\n https://twitter.com/ICCNC\n\n https://www.instagram.com/iccncofficial\n\nhttps://t.me/Iccnc\n\nhttps://www.facebook.com/ICCNCORG\n\nhttps://www.youtube.com/user/iccnc1\n\nhttps://www.yelp.com/biz/islamic-cultural-center-of-northern-california-oakland-2"
